services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: contextsmith
      POSTGRES_PASSWORD: contextsmith
      POSTGRES_DB: contextsmith
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextsmith -d contextsmith"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://contextsmith:contextsmith@postgres:5432/contextsmith
      REDIS_URL: redis://redis:6379/0
      CONTEXTSMITH_AUTO_MIGRATE: "true"
    ports:
      - "18000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/readyz"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 180s

  worker-default:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: ["python", "-m", "contextsmith_worker.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://contextsmith:contextsmith@postgres:5432/contextsmith
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-maintenance:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: ["python", "-m", "contextsmith_worker.maintenance"]
    environment:
      DATABASE_URL: postgresql+psycopg://contextsmith:contextsmith@postgres:5432/contextsmith
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:18000
    ports:
      - "13000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  postgres_data:
