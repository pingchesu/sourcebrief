services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sourcebrief}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sourcebrief}
      POSTGRES_DB: ${POSTGRES_DB:-sourcebrief}
    ports:
    - ${SOURCEBRIEF_POSTGRES_PORT:-${CONTEXTSMITH_POSTGRES_PORT:-55432}}:5432
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U $${POSTGRES_USER:-sourcebrief} -d $${POSTGRES_DB:-sourcebrief}
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
    - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
    - ${SOURCEBRIEF_REDIS_PORT:-${CONTEXTSMITH_REDIS_PORT:-6380}}:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 5s
      retries: 20
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: ${SOURCEBRIEF_DATABASE_URL:-${CONTEXTSMITH_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-sourcebrief}:${POSTGRES_PASSWORD:-sourcebrief}@postgres:5432/${POSTGRES_DB:-sourcebrief}}}
      REDIS_URL: ${SOURCEBRIEF_REDIS_URL:-${CONTEXTSMITH_REDIS_URL:-redis://redis:6379/0}}
      SOURCEBRIEF_AUTO_MIGRATE: ${SOURCEBRIEF_AUTO_MIGRATE:-${CONTEXTSMITH_AUTO_MIGRATE:-true}}
      SOURCEBRIEF_ADMIN_EMAIL: ${SOURCEBRIEF_ADMIN_EMAIL:-${CONTEXTSMITH_ADMIN_EMAIL:?set SOURCEBRIEF_ADMIN_EMAIL or CONTEXTSMITH_ADMIN_EMAIL in .env}}
      SOURCEBRIEF_ADMIN_PASSWORD: ${SOURCEBRIEF_ADMIN_PASSWORD:-${CONTEXTSMITH_ADMIN_PASSWORD:?set SOURCEBRIEF_ADMIN_PASSWORD or CONTEXTSMITH_ADMIN_PASSWORD in .env}}
      SOURCEBRIEF_ADMIN_DISPLAY_NAME: ${SOURCEBRIEF_ADMIN_DISPLAY_NAME:-${CONTEXTSMITH_ADMIN_DISPLAY_NAME:-SourceBrief Admin}}
      SOURCEBRIEF_BOOTSTRAP_WORKSPACE_NAME: ${SOURCEBRIEF_BOOTSTRAP_WORKSPACE_NAME:-${CONTEXTSMITH_BOOTSTRAP_WORKSPACE_NAME:-SourceBrief}}
      SOURCEBRIEF_BOOTSTRAP_WORKSPACE_SLUG: ${SOURCEBRIEF_BOOTSTRAP_WORKSPACE_SLUG:-${CONTEXTSMITH_BOOTSTRAP_WORKSPACE_SLUG:-sourcebrief}}
      SOURCEBRIEF_BOOTSTRAP_PROJECT_NAME: ${SOURCEBRIEF_BOOTSTRAP_PROJECT_NAME:-${CONTEXTSMITH_BOOTSTRAP_PROJECT_NAME:-Default Project}}
      SOURCEBRIEF_DEV_AUTH: ${SOURCEBRIEF_DEV_AUTH:-${CONTEXTSMITH_DEV_AUTH:-false}}
      SOURCEBRIEF_EMBEDDING_PROVIDER: ${SOURCEBRIEF_EMBEDDING_PROVIDER:-${CONTEXTSMITH_EMBEDDING_PROVIDER:-hashing}}
      SOURCEBRIEF_EMBEDDING_MODEL: ${SOURCEBRIEF_EMBEDDING_MODEL:-${CONTEXTSMITH_EMBEDDING_MODEL:-sourcebrief-hashing-v1}}
      SOURCEBRIEF_EMBEDDING_NORMALIZED: ${SOURCEBRIEF_EMBEDDING_NORMALIZED:-${CONTEXTSMITH_EMBEDDING_NORMALIZED:-true}}
      SOURCEBRIEF_EMBEDDING_ENDPOINT: ${SOURCEBRIEF_EMBEDDING_ENDPOINT:-${CONTEXTSMITH_EMBEDDING_ENDPOINT:-}}
      SOURCEBRIEF_EMBEDDING_API_KEY: ${SOURCEBRIEF_EMBEDDING_API_KEY:-${CONTEXTSMITH_EMBEDDING_API_KEY:-}}
      SOURCEBRIEF_EMBEDDING_DEPLOYMENT_ID: ${SOURCEBRIEF_EMBEDDING_DEPLOYMENT_ID:-${CONTEXTSMITH_EMBEDDING_DEPLOYMENT_ID:-}}
      SOURCEBRIEF_EMBEDDING_TIMEOUT: ${SOURCEBRIEF_EMBEDDING_TIMEOUT:-${CONTEXTSMITH_EMBEDDING_TIMEOUT:-30}}
      SOURCEBRIEF_RERANK_PROVIDER: ${SOURCEBRIEF_RERANK_PROVIDER:-${CONTEXTSMITH_RERANK_PROVIDER:-term-overlap}}
      SOURCEBRIEF_RERANK_MODEL: ${SOURCEBRIEF_RERANK_MODEL:-${CONTEXTSMITH_RERANK_MODEL:-sourcebrief-term-overlap-v1}}
      SOURCEBRIEF_RERANK_ENDPOINT: ${SOURCEBRIEF_RERANK_ENDPOINT:-${CONTEXTSMITH_RERANK_ENDPOINT:-}}
      SOURCEBRIEF_RERANK_API_KEY: ${SOURCEBRIEF_RERANK_API_KEY:-${CONTEXTSMITH_RERANK_API_KEY:-}}
      SOURCEBRIEF_RERANK_TIMEOUT: ${SOURCEBRIEF_RERANK_TIMEOUT:-${CONTEXTSMITH_RERANK_TIMEOUT:-30}}
      SOURCEBRIEF_ALLOW_LOCAL_GIT: ${SOURCEBRIEF_ALLOW_LOCAL_GIT:-${CONTEXTSMITH_ALLOW_LOCAL_GIT:-true}}
      SOURCEBRIEF_CORS_ORIGINS: ${SOURCEBRIEF_CORS_ORIGINS:-${CONTEXTSMITH_CORS_ORIGINS:-http://localhost:13000,http://127.0.0.1:13000}}
      SOURCEBRIEF_WORK_DIR: ${SOURCEBRIEF_WORK_DIR:-${CONTEXTSMITH_WORK_DIR:-/var/lib/sourcebrief/work}}
    ports:
    - ${SOURCEBRIEF_API_PORT:-${CONTEXTSMITH_API_PORT:-18000}}:8000
    volumes:
    - sourcebrief_work:/var/lib/sourcebrief/work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -fsS
      - http://localhost:8000/readyz
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s
  worker-default:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command:
    - python
    - -m
    - sourcebrief_worker.worker
    environment:
      DATABASE_URL: ${SOURCEBRIEF_DATABASE_URL:-${CONTEXTSMITH_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-sourcebrief}:${POSTGRES_PASSWORD:-sourcebrief}@postgres:5432/${POSTGRES_DB:-sourcebrief}}}
      REDIS_URL: ${SOURCEBRIEF_REDIS_URL:-${CONTEXTSMITH_REDIS_URL:-redis://redis:6379/0}}
      SOURCEBRIEF_ADMIN_EMAIL: ${SOURCEBRIEF_ADMIN_EMAIL:-${CONTEXTSMITH_ADMIN_EMAIL:?set SOURCEBRIEF_ADMIN_EMAIL or CONTEXTSMITH_ADMIN_EMAIL in .env}}
      SOURCEBRIEF_ADMIN_PASSWORD: ${SOURCEBRIEF_ADMIN_PASSWORD:-${CONTEXTSMITH_ADMIN_PASSWORD:?set SOURCEBRIEF_ADMIN_PASSWORD or CONTEXTSMITH_ADMIN_PASSWORD in .env}}
      SOURCEBRIEF_ADMIN_DISPLAY_NAME: ${SOURCEBRIEF_ADMIN_DISPLAY_NAME:-${CONTEXTSMITH_ADMIN_DISPLAY_NAME:-SourceBrief Admin}}
      SOURCEBRIEF_BOOTSTRAP_WORKSPACE_NAME: ${SOURCEBRIEF_BOOTSTRAP_WORKSPACE_NAME:-${CONTEXTSMITH_BOOTSTRAP_WORKSPACE_NAME:-SourceBrief}}
      SOURCEBRIEF_BOOTSTRAP_WORKSPACE_SLUG: ${SOURCEBRIEF_BOOTSTRAP_WORKSPACE_SLUG:-${CONTEXTSMITH_BOOTSTRAP_WORKSPACE_SLUG:-sourcebrief}}
      SOURCEBRIEF_BOOTSTRAP_PROJECT_NAME: ${SOURCEBRIEF_BOOTSTRAP_PROJECT_NAME:-${CONTEXTSMITH_BOOTSTRAP_PROJECT_NAME:-Default Project}}
      SOURCEBRIEF_DEV_AUTH: ${SOURCEBRIEF_DEV_AUTH:-${CONTEXTSMITH_DEV_AUTH:-false}}
      SOURCEBRIEF_EMBEDDING_PROVIDER: ${SOURCEBRIEF_EMBEDDING_PROVIDER:-${CONTEXTSMITH_EMBEDDING_PROVIDER:-hashing}}
      SOURCEBRIEF_EMBEDDING_MODEL: ${SOURCEBRIEF_EMBEDDING_MODEL:-${CONTEXTSMITH_EMBEDDING_MODEL:-sourcebrief-hashing-v1}}
      SOURCEBRIEF_EMBEDDING_NORMALIZED: ${SOURCEBRIEF_EMBEDDING_NORMALIZED:-${CONTEXTSMITH_EMBEDDING_NORMALIZED:-true}}
      SOURCEBRIEF_EMBEDDING_ENDPOINT: ${SOURCEBRIEF_EMBEDDING_ENDPOINT:-${CONTEXTSMITH_EMBEDDING_ENDPOINT:-}}
      SOURCEBRIEF_EMBEDDING_API_KEY: ${SOURCEBRIEF_EMBEDDING_API_KEY:-${CONTEXTSMITH_EMBEDDING_API_KEY:-}}
      SOURCEBRIEF_EMBEDDING_DEPLOYMENT_ID: ${SOURCEBRIEF_EMBEDDING_DEPLOYMENT_ID:-${CONTEXTSMITH_EMBEDDING_DEPLOYMENT_ID:-}}
      SOURCEBRIEF_EMBEDDING_TIMEOUT: ${SOURCEBRIEF_EMBEDDING_TIMEOUT:-${CONTEXTSMITH_EMBEDDING_TIMEOUT:-30}}
      SOURCEBRIEF_RERANK_PROVIDER: ${SOURCEBRIEF_RERANK_PROVIDER:-${CONTEXTSMITH_RERANK_PROVIDER:-term-overlap}}
      SOURCEBRIEF_RERANK_MODEL: ${SOURCEBRIEF_RERANK_MODEL:-${CONTEXTSMITH_RERANK_MODEL:-sourcebrief-term-overlap-v1}}
      SOURCEBRIEF_RERANK_ENDPOINT: ${SOURCEBRIEF_RERANK_ENDPOINT:-${CONTEXTSMITH_RERANK_ENDPOINT:-}}
      SOURCEBRIEF_RERANK_API_KEY: ${SOURCEBRIEF_RERANK_API_KEY:-${CONTEXTSMITH_RERANK_API_KEY:-}}
      SOURCEBRIEF_RERANK_TIMEOUT: ${SOURCEBRIEF_RERANK_TIMEOUT:-${CONTEXTSMITH_RERANK_TIMEOUT:-30}}
      SOURCEBRIEF_ALLOW_LOCAL_GIT: ${SOURCEBRIEF_ALLOW_LOCAL_GIT:-${CONTEXTSMITH_ALLOW_LOCAL_GIT:-true}}
      SOURCEBRIEF_CORS_ORIGINS: ${SOURCEBRIEF_CORS_ORIGINS:-${CONTEXTSMITH_CORS_ORIGINS:-http://localhost:13000,http://127.0.0.1:13000}}
      SOURCEBRIEF_WORK_DIR: ${SOURCEBRIEF_WORK_DIR:-${CONTEXTSMITH_WORK_DIR:-/var/lib/sourcebrief/work}}
    volumes:
    - ./tmp/qa-git-fixtures:/qa-fixtures:ro
    - sourcebrief_work:/var/lib/sourcebrief/work
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
  worker-maintenance:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command:
    - python
    - -m
    - sourcebrief_worker.maintenance
    environment:
      DATABASE_URL: ${SOURCEBRIEF_DATABASE_URL:-${CONTEXTSMITH_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-sourcebrief}:${POSTGRES_PASSWORD:-sourcebrief}@postgres:5432/${POSTGRES_DB:-sourcebrief}}}
      REDIS_URL: ${SOURCEBRIEF_REDIS_URL:-${CONTEXTSMITH_REDIS_URL:-redis://redis:6379/0}}
      SOURCEBRIEF_ADMIN_EMAIL: ${SOURCEBRIEF_ADMIN_EMAIL:-${CONTEXTSMITH_ADMIN_EMAIL:?set SOURCEBRIEF_ADMIN_EMAIL or CONTEXTSMITH_ADMIN_EMAIL in .env}}
      SOURCEBRIEF_ADMIN_PASSWORD: ${SOURCEBRIEF_ADMIN_PASSWORD:-${CONTEXTSMITH_ADMIN_PASSWORD:?set SOURCEBRIEF_ADMIN_PASSWORD or CONTEXTSMITH_ADMIN_PASSWORD in .env}}
      SOURCEBRIEF_ADMIN_DISPLAY_NAME: ${SOURCEBRIEF_ADMIN_DISPLAY_NAME:-${CONTEXTSMITH_ADMIN_DISPLAY_NAME:-SourceBrief Admin}}
      SOURCEBRIEF_BOOTSTRAP_WORKSPACE_NAME: ${SOURCEBRIEF_BOOTSTRAP_WORKSPACE_NAME:-${CONTEXTSMITH_BOOTSTRAP_WORKSPACE_NAME:-SourceBrief}}
      SOURCEBRIEF_BOOTSTRAP_WORKSPACE_SLUG: ${SOURCEBRIEF_BOOTSTRAP_WORKSPACE_SLUG:-${CONTEXTSMITH_BOOTSTRAP_WORKSPACE_SLUG:-sourcebrief}}
      SOURCEBRIEF_BOOTSTRAP_PROJECT_NAME: ${SOURCEBRIEF_BOOTSTRAP_PROJECT_NAME:-${CONTEXTSMITH_BOOTSTRAP_PROJECT_NAME:-Default Project}}
      SOURCEBRIEF_DEV_AUTH: ${SOURCEBRIEF_DEV_AUTH:-${CONTEXTSMITH_DEV_AUTH:-false}}
      SOURCEBRIEF_EMBEDDING_PROVIDER: ${SOURCEBRIEF_EMBEDDING_PROVIDER:-${CONTEXTSMITH_EMBEDDING_PROVIDER:-hashing}}
      SOURCEBRIEF_EMBEDDING_MODEL: ${SOURCEBRIEF_EMBEDDING_MODEL:-${CONTEXTSMITH_EMBEDDING_MODEL:-sourcebrief-hashing-v1}}
      SOURCEBRIEF_EMBEDDING_NORMALIZED: ${SOURCEBRIEF_EMBEDDING_NORMALIZED:-${CONTEXTSMITH_EMBEDDING_NORMALIZED:-true}}
      SOURCEBRIEF_EMBEDDING_ENDPOINT: ${SOURCEBRIEF_EMBEDDING_ENDPOINT:-${CONTEXTSMITH_EMBEDDING_ENDPOINT:-}}
      SOURCEBRIEF_EMBEDDING_API_KEY: ${SOURCEBRIEF_EMBEDDING_API_KEY:-${CONTEXTSMITH_EMBEDDING_API_KEY:-}}
      SOURCEBRIEF_EMBEDDING_DEPLOYMENT_ID: ${SOURCEBRIEF_EMBEDDING_DEPLOYMENT_ID:-${CONTEXTSMITH_EMBEDDING_DEPLOYMENT_ID:-}}
      SOURCEBRIEF_EMBEDDING_TIMEOUT: ${SOURCEBRIEF_EMBEDDING_TIMEOUT:-${CONTEXTSMITH_EMBEDDING_TIMEOUT:-30}}
      SOURCEBRIEF_RERANK_PROVIDER: ${SOURCEBRIEF_RERANK_PROVIDER:-${CONTEXTSMITH_RERANK_PROVIDER:-term-overlap}}
      SOURCEBRIEF_RERANK_MODEL: ${SOURCEBRIEF_RERANK_MODEL:-${CONTEXTSMITH_RERANK_MODEL:-sourcebrief-term-overlap-v1}}
      SOURCEBRIEF_RERANK_ENDPOINT: ${SOURCEBRIEF_RERANK_ENDPOINT:-${CONTEXTSMITH_RERANK_ENDPOINT:-}}
      SOURCEBRIEF_RERANK_API_KEY: ${SOURCEBRIEF_RERANK_API_KEY:-${CONTEXTSMITH_RERANK_API_KEY:-}}
      SOURCEBRIEF_RERANK_TIMEOUT: ${SOURCEBRIEF_RERANK_TIMEOUT:-${CONTEXTSMITH_RERANK_TIMEOUT:-30}}
      SOURCEBRIEF_ALLOW_LOCAL_GIT: ${SOURCEBRIEF_ALLOW_LOCAL_GIT:-${CONTEXTSMITH_ALLOW_LOCAL_GIT:-true}}
      SOURCEBRIEF_CORS_ORIGINS: ${SOURCEBRIEF_CORS_ORIGINS:-${CONTEXTSMITH_CORS_ORIGINS:-http://localhost:13000,http://127.0.0.1:13000}}
      SOURCEBRIEF_WORK_DIR: ${SOURCEBRIEF_WORK_DIR:-${CONTEXTSMITH_WORK_DIR:-/var/lib/sourcebrief/work}}
    volumes:
    - sourcebrief_work:/var/lib/sourcebrief/work
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
  frontend:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18000}
    ports:
    - ${SOURCEBRIEF_WEB_PORT:-${CONTEXTSMITH_WEB_PORT:-13000}}:3000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
volumes:
  postgres_data: null
  sourcebrief_work: null
